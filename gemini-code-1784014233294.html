<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Copilot Lite</title>
    <!-- Tailwind CSS untuk Desain -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React dan Babel CDN agar bisa membaca kode React langsung di browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONS SVG ---
        const Icons = {
          Brain: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 2.5 2.5 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></svg>,
          PenTool: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m12 19 7-7 3 3-7 7-3-3z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="m2 2 7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>,
          Calendar: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>,
          Key: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 1.5 1.5"/></svg>,
          Loader: () => <svg className="animate-spin w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        };

        // --- API CALL ---
        const generateAIContent = async (prompt, systemInstruction = "", userApiKey = "") => {
          if (!userApiKey) throw new Error("API_KEY_MISSING");
          const modelName = "gemini-1.5-flash"; 
          const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${userApiKey}`;
          const payload = { contents: [{ parts: [{ text: prompt }] }] };
          if (systemInstruction) payload.systemInstruction = { parts: [{ text: systemInstruction }] };

          const response = await fetch(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (response.status === 400 || response.status === 403) throw new Error("API_KEY_INVALID");
          if (!response.ok) throw new Error(`API error ${response.status}`);

          const result = await response.json();
          if (result.candidates && result.candidates.length > 0) {
            return result.candidates[0].content.parts[0].text;
          }
          throw new Error("Gagal memproses jawaban");
        };

        // --- APLIKASI UTAMA ---
        function CreatorCopilotApp() {
          const [apiKey, setApiKey] = useState("");
          const [isSaved, setIsSaved] = useState(false);
          const [activeTab, setActiveTab] = useState("planner");
          const [inputText, setInputText] = useState("");
          const [aiOutput, setAiOutput] = useState("");
          const [loading, setLoading] = useState(false);
          const [errorMsg, setErrorMsg] = useState("");

          useEffect(() => {
            const savedKey = localStorage.getItem("user_gemini_api_key");
            if (savedKey) {
              setApiKey(savedKey);
              setIsSaved(true);
            }
          }, []);

          const handleSaveApiKey = (e) => {
            e.preventDefault();
            if (apiKey.trim()) {
              localStorage.setItem("user_gemini_api_key", apiKey.trim());
              setIsSaved(true);
              setErrorMsg("");
              alert("API Key berhasil disimpan!");
            } else {
              alert("Masukkan API Key terlebih dahulu.");
            }
          };

          const handleResetApiKey = () => {
            localStorage.removeItem("user_gemini_api_key");
            setApiKey("");
            setIsSaved(false);
            alert("API Key dihapus.");
          };

          const handleGenerate = async () => {
            if (!apiKey) {
              setErrorMsg("Masukkan API Key di atas terlebih dahulu!");
              return;
            }
            setLoading(true);
            setErrorMsg("");
            setAiOutput("");

            let systemPrompt = "Anda adalah asisten pembuat konten (Creator Copilot) yang kreatif.";
            let userPrompt = inputText;

            if (activeTab === "planner") {
              systemPrompt += " Tugas Anda membuat ide konten bulanan terstruktur.";
              userPrompt = `Buatkan jadwal ide konten 30 hari berdasarkan topik: ${inputText}`;
            } else if (activeTab === "script") {
              systemPrompt += " Tugas Anda menulis naskah video pendek.";
              userPrompt = `Buatkan naskah video TikTok/Reels berdurasi 60 detik tentang: ${inputText}`;
            }

            try {
              const result = await generateAIContent(userPrompt, systemPrompt, apiKey);
              setAiOutput(result);
            } catch (err) {
              if (err.message === "API_KEY_INVALID") {
                setErrorMsg("API Key salah atau tidak valid.");
              } else {
                setErrorMsg("Terjadi kesalahan koneksi AI.");
              }
            } finally {
              setLoading(false);
            }
          };

          return (
            <div className="min-h-screen bg-slate-50 text-slate-800 p-4 md:p-8">
              <div className="max-w-4xl mx-auto space-y-6">
                <header className="flex items-center space-x-3 pb-6 border-b border-slate-200">
                  <div className="p-2 bg-indigo-600 text-white rounded-xl"><Icons.Brain /></div>
                  <div>
                    <h1 className="text-2xl font-bold text-slate-900">Creator Copilot Lite</h1>
                    <p className="text-sm text-slate-500">Asisten pembuat konten bertenaga AI Gemini</p>
                  </div>
                </header>

                {/* API KEY BOX */}
                <section className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                  <div className="flex items-center space-x-2 text-indigo-600 font-semibold mb-3">
                    <Icons.Key />
                    <h2>Pengaturan API Key Gemini Anda</h2>
                  </div>
                  <p className="text-xs text-slate-500 mb-4">
                    Masukkan <strong>Gemini API Key</strong> gratis Anda dari Google AI Studio. Kunci ini hanya disimpan aman di browser Anda sendiri.
                  </p>
                  <form onSubmit={handleSaveApiKey} className="flex flex-col sm:flex-row gap-3">
                    <input
                      type="password"
                      placeholder={isSaved ? "••••••••••••••••••••••••••••••••" : "Masukkan API Key Gemini Anda..."}
                      value={apiKey}
                      onChange={(e) => { setApiKey(e.target.value); if (isSaved) setIsSaved(false); }}
                      disabled={isSaved}
                      className="flex-1 px-4 py-2.5 rounded-xl border border-slate-300 text-sm disabled:bg-slate-100"
                    />
                    {isSaved ? (
                      <button type="button" onClick={handleResetApiKey} className="px-5 py-2.5 bg-rose-50 text-rose-600 text-sm font-medium rounded-xl">Ganti Key</button>
                    ) : (
                      <button type="submit" className="px-5 py-2.5 bg-indigo-600 text-white text-sm font-medium rounded-xl">Simpan Key</button>
                    )}
                  </form>
                </section>

                {/* TABS */}
                <div className="flex space-x-2 p-1 bg-slate-200/60 rounded-xl max-w-xs">
                  <button onClick={() => { setActiveTab("planner"); setAiOutput(""); }} className={`flex-1 flex items-center justify-center space-x-2 py-2 px-3 rounded-lg text-xs font-semibold ${activeTab === "planner" ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}><Icons.Calendar /> <span>30 Hari</span></button>
                  <button onClick={() => { setActiveTab("script"); setAiOutput(""); }} className={`flex-1 flex items-center justify-center space-x-2 py-2 px-3 rounded-lg text-xs font-semibold ${activeTab === "script" ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}><Icons.PenTool /> <span>Naskah</span></button>
                </div>

                {/* MAIN */}
                <main className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col justify-between">
                    <div className="space-y-4">
                      <label className="block text-sm font-semibold text-slate-700">{activeTab === "planner" ? "Topik Utama / Niche Konten" : "Konsep Naskah Video"}</label>
                      <textarea rows={5} placeholder={activeTab === "planner" ? "Contoh: Tips diet keto pemula..." : "Contoh: Cara hemat uang belanja..."} value={inputText} onChange={(e) => setInputText(e.target.value)} className="w-full px-4 py-3 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                    </div>
                    {errorMsg && <div className="mt-4 p-3 bg-red-50 text-red-700 text-xs rounded-xl">{errorMsg}</div>}
                    <button onClick={handleGenerate} disabled={loading || !inputText} className="mt-6 w-full flex items-center justify-center space-x-2 py-3 bg-slate-900 text-white rounded-xl font-medium disabled:bg-slate-200">
                      {loading ? <><Icons.Loader /> <span>Sedang meracik...</span></> : <span>Mulai Buat ✨</span>}
                    </button>
                  </div>

                  <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col min-h-[300px]">
                    <h3 className="text-sm font-semibold text-slate-700 mb-4 border-b pb-2">Hasil Rekomendasi AI</h3>
                    {aiOutput ? (
                      <div className="flex-1 whitespace-pre-line text-sm text-slate-600 overflow-y-auto max-h-[350px]">{aiOutput}</div>
                    ) : (
                      <div className="flex-1 flex flex-col items-center justify-center text-slate-400">
                        <Icons.Brain />
                        <p className="mt-2 text-xs">Hasil akan muncul di sini.</p>
                      </div>
                    )}
                  </div>
                </main>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CreatorCopilotApp />);
    </script>
</body>
</html>
